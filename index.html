<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق دردشة</title>

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:#fff;
    color:#000;
}

/* ================= APP LAYOUT ================= */
#app{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.page{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

/* ================= NAV ================= */
.nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:65px;
    background:#fff;
    border-top:1px solid #eee;
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:10000;
}

.nav div{
    text-align:center;
    font-size:18px;
    cursor:pointer;
    color:#333;
}

/* ================= CHAT PAGE ================= */
#chatPage{
    padding:70px 12px 90px;
}

.chat{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid #f0f0f0;
}

.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    background:#ddd;
}

.name{font-weight:700;}
.msg{font-size:13px;color:#777;margin-top:3px;}

.call-btn{
    width:38px;
    height:38px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    cursor:pointer;
}

.add-friend-btn{
    border:none;
    background:#0084ff;
    color:#fff;
    padding:10px 14px;
    border-radius:12px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
}

/* ================= CHAT DETAIL ================= */
#chatDetail{
    display:none;
    position:fixed;
    inset:0;
    background:#fff;
    flex-direction:column;
    z-index:9999;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
    margin-top:60px;
    margin-bottom:80px;
}

.input-box{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:8px;
    padding:10px;
    background:#fff;
    border-top:1px solid #eee;
    z-index:99999;
}

.input-box input{
    flex:1;
    height:45px;
    border:none;
    outline:none;
    background:#f5f5f5;
    border-radius:25px;
    padding:0 15px;
}

#sendBtn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:#25d366;
    cursor:pointer;
}

/* emoji */
.emoji-box{
    display:none;
    position:absolute;
    bottom:70px;
    left:0;
    right:0;
    background:#fff;
    padding:10px;
    border-top:1px solid #eee;
}

/* ================= STORIES ================= */
#stories{
    z-index:5000;
}

.story-back{
    position:absolute;
    top:15px;
    left:15px;
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.15);
    color:#fff;
    font-size:20px;
}

.story-actions{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:25px;
}

.story-actions div{
    font-size:26px;
    color:#fff;
}

</style>
</head>

<body>

<div id="app">

    <!-- CHAT PAGE -->
    <div id="chatPage" class="page">

        <div style="display:flex;justify-content:space-between;align-items:center;padding:15px;">
            <h3>الدردشات</h3>
            <button class="add-friend-btn" onclick="addFriend()">➕ إضافة صديق</button>
        </div>

        <div class="chat" onclick="openChat('أحمد')">
            <div class="left">
                <div class="avatar"></div>
                <div>
                    <div class="name">أحمد</div>
                    <div class="msg">مرحباً 👋</div>
                </div>
            </div>
            <button class="call-btn">📞</button>
        </div>

        <div class="chat" onclick="openChat('خالد')">
            <div class="left">
                <div class="avatar"></div>
                <div>
                    <div class="name">خالد</div>
                    <div class="msg">كيف حالك؟</div>
                </div>
            </div>
            <button class="call-btn">📞</button>
        </div>

    </div>

    <!-- PROFILE -->
    <div id="profilePage" class="page" style="display:none;">الحساب</div>

</div>

<!-- CHAT DETAIL -->
<div id="chatDetail">

    <div class="header">
        <button onclick="closeChat()">←</button>
        <div id="chatName">محادثة</div>
    </div>

    <div id="messages"></div>

    <div class="input-box">
        <button>🖼️</button>
        <button onclick="toggleEmoji()">😀</button>
        <input id="msgInput" placeholder="اكتب رسالة...">
        <button id="sendBtn">🎙️</button>
    </div>

    <div id="emojiBox" class="emoji-box">
        <span>😀</span><span>😂</span><span>😍</span>
        <span>😎</span><span>😢</span><span>😡</span>
        <span>👍</span><span>❤️</span><span>🔥</span>
    </div>

</div>

<!-- STORIES -->
<div id="stories">
    <button class="story-back" onclick="closeStories()">←</button>

    <div class="story-actions">
        <div>❤</div>
        <div>👁</div>
    </div>
</div>

<!-- NAV -->
<div class="nav">
    <div onclick="showChats()">💬<br>دردشة</div>
    <div onclick="showStories()">👁<br>قصص</div>
    <div onclick="openProfile()">👤<br>حسابي</div>
</div>

<input type="file" id="fileInput" hidden>

<script>

/* functions */
function openProfile(){ alert("الملف الشخصي"); }

function addFriend(){
    let name = prompt("أدخل اسم الصديق");
    if(name) alert("تم إرسال طلب: " + name);
}

/* pages */
let current = 0;
const pages = ["chatPage","stories","profilePage"];

function showPage(i){
    pages.forEach((id, x)=>{
        document.getElementById(id).style.display =
        (x===i)?"block":"none";
    });
    current=i;
}

function showChats(){showPage(0);}
function showStories(){showPage(1);}
function showProfile(){showPage(2);}

/* swipe */
let startX=0;

document.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
    let diff=startX-e.changedTouches[0].clientX;

    if(Math.abs(diff)>50){
        if(diff>0) current++;
        else current--;

        if(current<0) current=0;
        if(current>2) current=2;

        showPage(current);
    }
});

</script>

</body>
</html>
