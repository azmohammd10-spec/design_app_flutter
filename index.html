<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#eef2f7;
}

/* LOGIN */
#login-screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:10px;
}

input{
width:80%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:80%;
padding:12px;
border:none;
border-radius:10px;
background:#111827;
color:#fff;
}

/* APP */
#app{
display:none;
padding:20px;
}

.header{
font-size:20px;
font-weight:700;
margin-bottom:20px;
}

/* CHAT BOX */
#chat-box{
margin-top:20px;
}
.msg{
background:#fff;
padding:10px;
margin:5px 0;
border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login-screen">

<h2>تسجيل الدخول</h2>

<input id="phone" placeholder="رقم الهاتف +967...">
<button onclick="sendCode()">إرسال كود</button>

<input id="code" placeholder="كود التحقق">
<button onclick="verifyCode()">تأكيد</button>

<div id="recaptcha"></div>

</div>

<!-- 💬 APP -->
<div id="app">

<div class="header">توفير 💬</div>

<input id="msg" placeholder="اكتب رسالة">
<button onclick="sendMsg()">إرسال</button>

<div id="chat-box"></div>

</div>

<!-- ⚙️ FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
apiKey: "AIzaSyD39_c_pQmI33APYKfw_Z_af4iEPlcV-ts",
authDomain: "tofeer-e9c5a.firebaseapp.com",
projectId: "tofeer-e9c5a",
storageBucket: "tofeer-e9c5a.appspot.com",
messagingSenderId: "927174968674",
appId: "1:927174968674:web:5bafb6e43161c50cda983b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔐 reCAPTCHA */
window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha", {
size: "invisible"
});

/* 📩 إرسال كود */
window.sendCode = async function(){

const phone = document.getElementById("phone").value;

window.confirmationResult = await signInWithPhoneNumber(
auth,
phone,
window.recaptchaVerifier
);

alert("تم إرسال الكود");
};

/* ✅ تأكيد */
window.verifyCode = async function(){

const code = document.getElementById("code").value;

await window.confirmationResult.confirm(code);

alert("تم تسجيل الدخول");

document.getElementById("login-screen").style.display = "none";
document.getElementById("app").style.display = "block";

loadMessages();
};

/* 💬 إرسال رسالة */
window.sendMsg = async function(){

let msg = document.getElementById("msg").value;
if(msg.trim() === "") return;

await addDoc(collection(db,"messages"),{
text: msg,
time: Date.now()
});

document.getElementById("msg").value="";
};

/* 🔥 تحميل الرسائل لحظياً */
function loadMessages(){

const q = query(collection(db,"messages"), orderBy("time"));

onSnapshot(q,(snapshot)=>{

let box = document.getElementById("chat-box");
box.innerHTML="";

snapshot.forEach(doc=>{
let m = doc.data();
box.innerHTML += `<div class="msg">${m.text}</div>`;
});

});
}

</script>

</body>
</html>
