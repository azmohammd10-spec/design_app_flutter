<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير - تسجيل الدخول</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eef2f7;
}

/* LOGIN */
#login-screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:10px;
}

input{
width:80%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

button{
width:80%;
padding:12px;
border:none;
border-radius:10px;
background:#111827;
color:#fff;
cursor:pointer;
}

/* APP */
#app{
display:none;
padding:20px;
}

.header{
font-size:20px;
font-weight:700;
margin-bottom:20px;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="login-screen">

<h2>تسجيل الدخول</h2>

<input id="phone" placeholder="رقم الهاتف +967...">
<button onclick="sendCode()">إرسال كود</button>

<input id="code" placeholder="كود التحقق">
<button onclick="verifyCode()">تأكيد</button>

<div id="recaptcha"></div>

</div>

<!-- 📱 APP -->
<div id="app">

<div class="header">توفير 💬</div>

<p>تم تسجيل الدخول بنجاح 🎉</p>

</div>

<!-- ⚙️ FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
apiKey: "ضع_مفتاحك هنا",
authDomain: "tofeer-e9c5a.firebaseapp.com",
projectId: "tofeer-e9c5a",
appId: "1:927174968674:web:5bafb6e43161c5cda983b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔐 reCAPTCHA */
window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha", {
size: "invisible"
});

/* 📩 إرسال كود */
window.sendCode = async function(){

const phone = document.getElementById("phone").value;

window.confirmationResult = await signInWithPhoneNumber(
auth,
phone,
window.recaptchaVerifier
);

alert("تم إرسال الكود");
};

/* ✅ تأكيد الكود */
window.verifyCode = async function(){

const code = document.getElementById("code").value;

await window.confirmationResult.confirm(code);

alert("تم تسجيل الدخول");

/* 🔁 تحويل للشاشة الرئيسية */
document.getElementById("login-screen").style.display = "none";
document.getElementById("app").style.display = "block";
};

</script>

</body>
</html>
