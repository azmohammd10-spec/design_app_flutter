<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
}

.video {
    width: 100%;
    height: 100vh;
    scroll-snap-align: start;
    position: relative;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.container {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.like {
    position: absolute;
    bottom: 100px;
    right: 20px;
    color: white;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="video">
        <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video>
        <div class="like" onclick="like(this)">❤️</div>
    </div>

    <div class="video">
        <video src="https://www.w3schools.com/html/movie.mp4" autoplay loop muted></video>
        <div class="like" onclick="like(this)">❤️</div>
    </div>

</div>

<script>
function like(el){
    if(el.innerHTML === "❤️"){
        el.innerHTML = "💖";
    } else {
        el.innerHTML = "❤️";
    }
}
</script>

</body>
</html>
