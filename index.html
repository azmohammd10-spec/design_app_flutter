<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير - دردشة</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#f6fbff;
color:#111;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:90%;
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #e6e6e6;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#4da3ff;
color:#fff;
font-weight:600;
cursor:pointer;
}

/* APP */
#app{
display:none;
height:100vh;
flex-direction:column;
}

.header{
padding:15px;
background:#fff;
font-weight:700;
border-bottom:1px solid #eee;
}

/* CHAT LIST */
.chat{
padding:15px;
background:#fff;
margin:10px;
border-radius:12px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* CHAT BOX */
#chatBox{
display:none;
flex-direction:column;
height:calc(100vh - 120px);
}

.messages{
flex:1;
padding:10px;
overflow-y:auto;
}

.msg{
background:#e9f4ff;
padding:10px;
margin:5px 0;
border-radius:10px;
max-width:70%;
}

.inputBox{
display:flex;
padding:10px;
background:#fff;
border-top:1px solid #eee;
}

.inputBox input{
flex:1;
margin:0;
}

.inputBox button{
width:80px;
margin-left:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="card">
<h3>تسجيل الدخول</h3>
<input id="phone" placeholder="اكتب اسمك">
<button onclick="login()">دخول</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="header">توفير 💬</div>

<div class="chat" onclick="openChat('أحمد')">أحمد</div>
<div class="chat" onclick="openChat('خالد')">خالد</div>

<!-- CHAT -->
<div id="chatBox">
<div class="messages" id="messages"></div>

<div class="inputBox">
<input id="msg" placeholder="اكتب رسالة">
<button onclick="sendMsg()">إرسال</button>
</div>
</div>

</div>

<script>
let user = "";
let currentChat = "";

/* login */
function login(){
user = document.getElementById("phone").value;

if(user.trim()==""){
alert("اكتب اسمك");
return;
}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}

/* open chat */
function openChat(name){
currentChat = name;
document.getElementById("chatBox").style.display="flex";
document.getElementById("messages").innerHTML="";
}

/* send msg */
function sendMsg(){
let msg = document.getElementById("msg").value;
if(msg.trim()=="") return;

document.getElementById("messages").innerHTML +=
`<div class="msg"><b>${user}:</b> ${msg}</div>`;

document.getElementById("msg").value="";
}
</script>

</body>
</html>
