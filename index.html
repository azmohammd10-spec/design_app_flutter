<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eefcff;
color:#000;
}

/* ===== CHAT LIST ===== */
#chatPage{
padding:10px;
padding-bottom:90px;
}

.chat{
display:flex;
align-items:center;
gap:12px;
background:#fff;
padding:14px;
margin-bottom:10px;
border-radius:16px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
cursor:pointer;
}

.avatar{
width:52px;
height:52px;
border-radius:50%;
background:#74e7ff;
flex-shrink:0;
}

.name{font-weight:700;}
.msg{font-size:13px;color:#666;margin-top:3px;}

/* ===== CHAT ===== */
#chatDetail{
display:none;
position:fixed;
inset:0;
background:#eefcff;
flex-direction:column;
z-index:999;
}

.header{
height:60px;
background:#fff;
display:flex;
align-items:center;
gap:10px;
padding:0 15px;
border-bottom:1px solid #d8f8ff;
}

.back{
width:38px;height:38px;
border:none;border-radius:10px;
background:#74e7ff;
cursor:pointer;
}

#messages{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.my-msg{
align-self:flex-end;
background:#74e7ff;
padding:10px 14px;
border-radius:18px 18px 4px 18px;
max-width:75%;
}

.other-msg{
align-self:flex-start;
background:#fff;
padding:10px 14px;
border-radius:18px 18px 18px 4px;
max-width:75%;
}

.input-box{
display:flex;
gap:10px;
padding:10px;
background:#fff;
border-top:1px solid #d8f8ff;
}

.input-box input{
flex:1;
padding:12px;
border:none;
outline:none;
background:#eefcff;
border-radius:12px;
}

.input-box button{
padding:12px 18px;
border:none;
background:#74e7ff;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

/* ===== STORIES ===== */
#stories{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:1000;
}

.story-actions{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:30px;
}

.story-icon{
width:54px;
height:54px;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
border:2px solid #74e7ff;
border-radius:16px;
font-size:24px;
}

.story-user{
position:absolute;
right:15px;
bottom:80px;
display:flex;
align-items:center;
gap:10px;
color:#fff;
}

.story-avatar{
width:50px;height:50px;
border-radius:50%;
background:#74e7ff;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:#000;
}

.story-name{font-weight:700}

/* ===== NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #d8f8ff;
}

.nav div{font-size:24px;cursor:pointer;}

.plus{
width:56px;
height:44px;
background:#74e7ff;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:900;
position:relative;
top:-12px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div id="chatPage">

<div class="chat" onclick="openChat('أحمد')">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً 👋</div>
</div>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>

</div>

<div id="chatDetail">

<div class="header">
<button class="back" onclick="closeChat()">←</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages">
<div class="other-msg">أهلاً 👋</div>
<div class="my-msg">مرحبا</div>
</div>

<div class="input-box">
<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="send()">إرسال</button>
</div>

</div>

<div id="stories">

<div class="story-actions">
<div>❤️</div>
<div>👁</div>
</div>

<div class="story-user">
<div class="story-avatar">🤵🏽</div>
<div class="story-name">الحساب</div>
</div>

</div>

<div class="nav">
<div onclick="showChats()">💬</div>
<div class="plus">+</div>
<div onclick="showStories()">👁</div>
</div>

<script>

function openChat(name){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="flex";
document.getElementById("chatName").innerText=name;
}

function closeChat(){
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showChats(){
document.getElementById("chatPage").style.display="block";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="none";
}

function showStories(){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="block";
}

function send(){
let input=document.getElementById("msgInput");
if(input.value.trim()!==""){
let msg=document.createElement("div");
msg.className="my-msg";
msg.innerText=input.value;
document.getElementById("messages").appendChild(msg);
input.value="";
}
}

</script>

</body>
</html>
