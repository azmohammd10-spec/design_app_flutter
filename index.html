<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>STAR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// تسجيل دخول
window.login = async function(){
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
  alert("تم تسجيل الدخول");
}

// رفع فيديو (رابط فقط كبداية)
window.uploadVideo = async function(){
  const url = prompt("ضع رابط الفيديو");

  if(url){
    await addDoc(collection(db, "videos"), {
      url: url,
      likes: 0,
      time: Date.now()
    });
    alert("تم رفع الفيديو");
    loadVideos();
  }
}

// تحميل الفيديوهات
window.loadVideos = async function(){
  const container = document.getElementById("videos");
  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "videos"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    container.innerHTML += `
      <div class="video">
        <video src="${data.url}" autoplay loop muted></video>
      </div>
    `;
  });
}

window.onload = loadVideos;
</script>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

.video {
  height:100vh;
  width:100%;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}

.btn {
  position:fixed;
  z-index:999;
  padding:10px;
  background:red;
  color:white;
  border:none;
  top:10px;
}
</style>

</head>

<body>

<button class="btn" onclick="login()">تسجيل الدخول</button>
<button class="btn" style="top:50px" onclick="uploadVideo()">رفع فيديو</button>

<div id="videos"></div>

</body>
</html>
