<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#ffffff;
color:#000;
}

/* ===== CHAT LIST ===== */
#chatPage{
padding:12px;
padding-bottom:80px;
}

.chat{
display:flex;
align-items:center;
gap:12px;
background:#ffffff;
padding:14px;
margin-bottom:10px;
border-radius:16px;
border:1px solid #e6f7ff;
cursor:pointer;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:#d9f5ff;
}

.name{font-weight:700;}
.msg{font-size:13px;color:#777;margin-top:3px;}

/* ===== CHAT ===== */
#chatDetail{
display:none;
position:fixed;
inset:0;
background:#fff;
flex-direction:column;
z-index:999;
}

.header{
height:60px;
display:flex;
align-items:center;
gap:10px;
padding:0 12px;
border-bottom:1px solid #e6f7ff;
}

.back{
width:36px;
height:36px;
border:none;
border-radius:10px;
background:#d9f5ff;
cursor:pointer;
}

#messages{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.my-msg{
align-self:flex-end;
background:#d9f5ff;
padding:10px 14px;
border-radius:16px 16px 4px 16px;
max-width:75%;
}

.other-msg{
align-self:flex-start;
background:#f5fbff;
padding:10px 14px;
border-radius:16px 16px 16px 4px;
max-width:75%;
}

/* ===== INPUT ===== */
.input-box{
display:flex;
gap:10px;
padding:10px;
border-top:1px solid #e6f7ff;
background:#fff;
}

.input-box input{
flex:1;
padding:12px;
border:none;
outline:none;
background:#f5fbff;
border-radius:12px;
}

.input-box button{
padding:12px 16px;
border:none;
background:#d9f5ff;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

/* ===== STORIES (SWIPE STYLE) ===== */
#stories{
display:none;
position:fixed;
inset:0;
background:#fff;
z-index:1000;
overflow:hidden;
}

.story{
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
background:#ffffff;
border-bottom:1px solid #e6f7ff;
}

/* swipe container */
#storyContainer{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.story{
scroll-snap-align:start;
}

/* right action buttons */
.story-actions{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:20px;
}

.story-actions div{
width:50px;
height:50px;
background:#f5fbff;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
border:1px solid #e6f7ff;
}

/* bottom user */
.story-user{
position:absolute;
right:15px;
bottom:80px;
display:flex;
align-items:center;
gap:10px;
}

.story-avatar{
width:45px;
height:45px;
border-radius:50%;
background:#d9f5ff;
}

/* ===== NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #e6f7ff;
}

.nav div{
font-size:24px;
cursor:pointer;
}

.plus{
width:50px;
height:50px;
background:#d9f5ff;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
transform:translateY(-10px);
}

</style>
</head>

<body>

<!-- CHAT LIST -->
<div id="chatPage">

<div class="chat" onclick="openChat('أحمد')">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً 👋</div>
</div>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>

</div>

<!-- CHAT -->
<div id="chatDetail">

<div class="header">
<button class="back" onclick="closeChat()">←</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages"></div>

<div class="input-box">
<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="send()">إرسال</button>
</div>

</div>

<!-- STORIES -->
<div id="stories">

<div id="storyContainer">

<div class="story">قصة 1</div>
<div class="story">قصة 2</div>
<div class="story">قصة 3</div>

</div>

<div class="story-actions">
<div>❤️</div>
<div>👁</div>
<div>💬</div>
</div>

<div class="story-user">
<div class="story-avatar"></div>
<div>الحساب</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="showChats()">💬</div>
<div class="plus">+</div>
<div onclick="showStories()">👁</div>
</div>

<script>

function openChat(name){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="flex";
document.getElementById("chatName").innerText=name;
}

function closeChat(){
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showChats(){
document.getElementById("stories").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showStories(){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="block";
}

/* messages */
function send(){
let input=document.getElementById("msgInput");
if(input.value.trim()!==""){
let msg=document.createElement("div");
msg.className="my-msg";
msg.innerText=input.value;
document.getElementById("messages").appendChild(msg);
input.value="";
}
}

</script>

</body>
</html>
