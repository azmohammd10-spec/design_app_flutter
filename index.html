<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eef2f7;
}

/* LOGIN */
.screen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.card{
width:85%;
background:#fff;
padding:20px;
border-radius:14px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#111827;
color:#fff;
cursor:pointer;
}

/* APP */
#app{
display:none;
padding:20px;
}

.section{
background:#fff;
padding:12px;
margin-bottom:10px;
border-radius:12px;
}

.chat{
background:#f8fafc;
padding:10px;
margin-top:8px;
border-radius:10px;
cursor:pointer;
}

.msg-box{
margin-top:15px;
}

.msg{
background:#fff;
padding:8px;
margin:5px 0;
border-radius:10px;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login-screen" class="screen">

<div class="card">

<h2>تسجيل الدخول</h2>

<input id="phone" placeholder="اكتب اسمك فقط">
<button onclick="login()">دخول</button>

</div>

</div>

<!-- 📱 APP -->
<div id="app">

  <div class="section">
    <h3>📸 القصص</h3>
    <div class="chat">قصة 1 👁 1200</div>
    <div class="chat">قصة 2 👁 800</div>
  </div>

  <div class="section">
    <h3>💬 الدردشات</h3>

    <div class="chat" onclick="openChat('أحمد')">أحمد</div>
    <div class="chat" onclick="openChat('خالد')">خالد</div>
  </div>

  <div class="section">
    <h3>👤 الحساب</h3>
    <div id="user">اسمك: </div>
  </div>

  <!-- 💬 chat box -->
  <div class="section" id="chatBox" style="display:none;">
    <h3 id="chatName"></h3>

    <div id="messages"></div>

    <input id="msgInput" placeholder="اكتب رسالة">
    <button onclick="sendMsg()">إرسال</button>
  </div>

</div>

<script>

let currentChat = "";
let userName = "";

/* تسجيل دخول بسيط */
function login(){
  userName = document.getElementById("phone").value;

  if(userName.trim() === ""){
    alert("اكتب اسمك");
    return;
  }

  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("user").innerText = "اسمك: " + userName;
}

/* فتح دردشة */
function openChat(name){
  currentChat = name;

  document.getElementById("chatBox").style.display = "block";
  document.getElementById("chatName").innerText = "دردشة مع " + name;

  document.getElementById("messages").innerHTML = "";
}

/* إرسال رسالة */
function sendMsg(){
  let msg = document.getElementById("msgInput").value;

  if(msg.trim() === "") return;

  let box = document.getElementById("messages");

  box.innerHTML += `
    <div class="msg"><b>${userName}:</b> ${msg}</div>
  `;

  document.getElementById("msgInput").value = "";
}

</script>

</body>
</html>
