<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eef3f8;
padding-bottom:90px;
}

/* HEADER */
.header{
height:65px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:700;
border-bottom:1px solid #eee;
}

/* CHAT AREA (حتى لا تكون شاشة بيضاء) */
.content{
padding:12px;
}

/* CHAT BOX */
.chat{
background:#fff;
border-radius:18px;
padding:14px;
margin-bottom:12px;
display:flex;
gap:12px;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#dff4ff,#e8fff1);
}

.name{
font-weight:700;
}

.last{
font-size:13px;
color:#777;
}

/* 🔥 TIKTOK BUTTON */
.camera-btn{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:18px;

width:64px;
height:64px;
border-radius:50%;

/* TikTok style colors */
background:conic-gradient(
from 180deg,
#ff0050,
#ff4ecd,
#00f2ea,
#ff0050
);

border:3px solid #fff;
color:#fff;
font-size:30px;
font-weight:700;

display:flex;
align-items:center;
justify-content:center;

/* glow effect */
box-shadow:
0 10px 25px rgba(0,0,0,.25),
0 0 20px rgba(255,0,80,.4);

cursor:pointer;
}

.camera-btn:active{
transform:translateX(-50%) scale(0.92);
}

/* NAV BAR */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #eee;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:18px;
color:#777;
}

.nav-item span{
font-size:11px;
}

</style>
</head>

<body>

<div class="header">توفير</div>

<div class="content">

<div class="chat">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="last">آخر رسالة...</div>
</div>
</div>

<div class="chat">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="last">مرحباً 👋</div>
</div>
</div>

</div>

<!-- زر تيك توك -->
<button class="camera-btn">＋</button>

<!-- bottom nav -->
<div class="bottom-nav">

<div class="nav-item">💬<span>دردشه</span></div>

<div class="nav-item">👁<span>تحديثات</span></div>

</div>

</body>
</html>
