<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>رفع فيديو - STAR</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

input,textarea,button,select{
    width:100%;
    margin-top:15px;
    padding:14px;
    border-radius:10px;
    border:none;
    box-sizing:border-box;
}

button{
    background:#FFD700;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">

<h2>رفع فيديو جديد</h2>

<input
type="file"
id="videoFile"
accept="video/*">

<textarea
id="caption"
placeholder="اكتب وصف الفيديو"></textarea>

<select id="category">

<option value="عام">عام</option>
<option value="تقنية">تقنية</option>
<option value="رياضة">رياضة</option>
<option value="ألعاب">ألعاب</option>
<option value="طبخ">طبخ</option>

</select>

<button id="uploadBtn">

رفع الفيديو

</button>

</div>

<script type="module" src="../js/upload.js"></script>

</body>
</html>
